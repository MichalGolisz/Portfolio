<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Moje Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        header {
            padding: 60px 20px 20px 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 32px;
            text-align: center;
        }

        p {
            color: #aaa;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        .card {
            background-color: #1e1e1e;
            padding: 50px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #2c2c2c;
        }

        .card:hover {
            background-color: #2a2a2a;
            transform: translateY(-6px);
            border-color: #4CAF50;
        }

        footer {
            padding: 20px;
            background-color: #1e1e1e;
            color: #888;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <h1>Michał Golisz</h1>
        <p1>Wraz z nabywanym doświadczeniem treści na stronie będzie stopniowo przybywać, a sama strona będzie się coraz bardziej rozwijać i doskonalić.</p1>
    </header>

    <main>
        <div class="menu">
            <a href="o-mnie.html" class="card">O mnie</a>
            <a href="doswiadczenie.html" class="card">Doświadczenie</a>
            <a href="projekty.html" class="card">Moje projekty</a>
            <a href="edukacja.html" class="card">Edukacja</a>
        </div>
    </main>

    <footer>
        © 2026 Michał Golisz Portfolio
    </footer>

</body>

</html>
